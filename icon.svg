<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 铁轨 -->
  <rect x="60" y="340" width="392" height="16" rx="8" fill="url(#track)" opacity="0.3"/>
  <rect x="60" y="380" width="392" height="16" rx="8" fill="url(#track)" opacity="0.2"/>
  <!-- 枕木 -->
  <rect x="60" y="335" width="392" height="66" rx="6" fill="#334155" opacity="0.5"/>
  <!-- 火车头 -->
  <rect x="140" y="180" width="200" height="155" rx="24" fill="#f59e0b"/>
  <rect x="155" y="196" width="170" height="80" rx="14" fill="#0f172a"/>
  <!-- 车窗 -->
  <rect x="172" y="208" width="50" height="56" rx="8" fill="#3b82f6" opacity="0.8"/>
  <rect x="240" y="208" width="50" height="56" rx="8" fill="#3b82f6" opacity="0.8"/>
  <!-- 车灯 -->
  <circle cx="340" cy="260" r="18" fill="#fbbf24"/>
  <circle cx="340" cy="260" r="10" fill="#fff" opacity="0.9"/>
  <!-- 烟囱 -->
  <rect x="280" y="164" width="16" height="20" rx="4" fill="#d97706"/>
  <!-- 轮子 -->
  <circle cx="190" cy="370" r="28" fill="#334155"/>
  <circle cx="190" cy="370" r="18" fill="#1e293b"/>
  <circle cx="190" cy="370" r="8" fill="#475569"/>
  <circle cx="290" cy="370" r="28" fill="#334155"/>
  <circle cx="290" cy="370" r="18" fill="#1e293b"/>
  <circle cx="290" cy="370" r="8" fill="#475569"/>
  <!-- 铁路标志 ✕ -->
  <line x1="96" y1="130" x2="140" y2="86" stroke="#f59e0b" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <line x1="140" y1="130" x2="96" y2="86" stroke="#f59e0b" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
</svg>
